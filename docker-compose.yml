version: '3.3'

services:
   app:
      container_name: cat
      build:
        context: .
        dockerfile: Dockerfile
      command: python3 -m userbot
      restart: on-failure
      environment:
        - MONGO_DB_URI=mongodb://mongo:27017/catuserbot
      depends_on:
        - mongo

   mongo:
      image: mongo
      restart: always
      volumes:
        - db:/data/db
volumes:
  db:
    driver: local
  botdata:
    driver: local

